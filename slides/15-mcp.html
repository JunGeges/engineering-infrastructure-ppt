<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>15 · MCP 工具链</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=Source+Serif+4:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .slide{width:1920px;height:1080px;position:relative;padding:var(--sp-xl) var(--sp-2xl);display:flex;flex-direction:column;}
  .header{display:flex;align-items:baseline;gap:var(--sp-s);margin-bottom:var(--sp-l);}
  .section-num{font-family:-apple-system,sans-serif;font-size:var(--fs-tiny);color:var(--accent);letter-spacing:.1em;}
  .section-title{font-family:"Source Serif 4","Newsreader",serif;font-size:var(--fs-title);font-weight:500;color:var(--text-primary);letter-spacing:-.01em;margin:0;}
  .section-sub{margin-left:auto;font-family:-apple-system,sans-serif;font-size:var(--fs-small);color:var(--text-muted);}
  .subtitle{font-family:"Source Serif 4",serif;font-size:var(--fs-body);color:var(--text-secondary);margin:var(--sp-s) 0 var(--sp-l) 0;max-width:880px;}
  .tools-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-m);flex:1;}
  .tool-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-l) var(--sp-m);display:flex;flex-direction:column;align-items:center;text-align:center;}
  .tool-icon{width:56px;height:56px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:"Source Serif 4",serif;font-size:26px;font-weight:600;margin-bottom:var(--sp-s);}
  .tool-name{font-family:"Source Serif 4",serif;font-size:var(--fs-sub);font-weight:500;color:var(--text-primary);margin:0 0 6px 0;}
  .tool-id{font-family:"SF Mono","Fira Code",monospace;font-size:var(--fs-small);color:var(--accent);padding:2px 10px;background:var(--accent-subtle);border-radius:var(--radius-sm);margin-bottom:var(--sp-s);}
  .tool-desc{font-family:-apple-system,sans-serif;font-size:var(--fs-body);color:var(--text-secondary);line-height:1.6;}
  .tool-role{font-family:-apple-system,sans-serif;font-size:var(--fs-small);color:var(--text-muted);margin-top:var(--sp-xs);}
  .slide-number{position:absolute;bottom:44px;right:var(--sp-2xl);font-family:-apple-system,sans-serif;font-size:var(--fs-tiny);color:var(--text-muted);letter-spacing:.06em;}
</style></head>
<body>
<div class="slide">
  <div class="header">
    <span class="section-num">15 · INFRA</span>
    <h2 class="section-title">MCP 工具链</h2>
    <span class="section-sub">AI 的感官系统</span>
  </div>
  <p class="subtitle">四套 MCP 协议将 Claude Code 接入项目全链路数据源，让 AI 能看需求、读设计、查接口。</p>
  <div class="tools-grid">
    <div class="tool-card">
      <div class="tool-icon">T</div>
      <h3 class="tool-name">TAPD MCP</h3>
      <span class="tool-id">ws: 53975838</span>
      <p class="tool-desc">自动查需求、流转状态、评论闭环、关联 Bug</p>
    </div>
    <div class="tool-card">
      <div class="tool-icon">A</div>
      <h3 class="tool-name">Apifox MCP</h3>
      <span class="tool-id">pj: 6942216</span>
      <p class="tool-desc">读 OpenAPI Spec，生成带正确参数和错误边界代码</p>
    </div>
    <div class="tool-card">
      <div class="tool-icon">P</div>
      <h3 class="tool-name">Pencil MCP</h3>
      <span class="tool-id">.pen 设计文件</span>
      <p class="tool-desc">提取精确间距、色值、圆角、字体，1:1 还原</p>
    </div>
    <div class="tool-card">
      <div class="tool-icon">S</div>
      <h3 class="tool-name">Stitch MCP</h3>
      <span class="tool-id">AI 设计辅助</span>
      <p class="tool-desc">文本描述 → 生成交互界面，快速原型验证</p>
    </div>
  </div>
  <div class="slide-number">15</div>
</div>
<script>if(window.self===window.top){(function(){var W=1920,H=1080;function fit(){var s=Math.min(window.innerWidth/W,window.innerHeight/H);document.body.style.transform='scale('+s+')';}fit();window.addEventListener('resize',fit);})();}</script>
</body>
</html>
