<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>13 · /auto-dev 五阶段引擎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=Source+Serif+4:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .slide { width:1920px; height:1080px; position:relative; padding:var(--sp-xl) var(--sp-2xl); display:flex; flex-direction:column; }
  .header { display:flex; align-items:baseline; gap:var(--sp-s); margin-bottom:var(--sp-xl); }
  .section-num { font-family:-apple-system,sans-serif; font-size:var(--fs-tiny); color:var(--accent); letter-spacing:0.1em; }
  .section-title { font-family:"Source Serif 4","Newsreader",serif; font-size:var(--fs-title); font-weight:500; color:var(--text-primary); letter-spacing:-0.01em; margin:0; }
  .section-sub { margin-left:auto; font-family:-apple-system,sans-serif; font-size:var(--fs-small); color:var(--text-muted); letter-spacing:0.04em; }
  .flow-container { flex:1; display:flex; align-items:center; justify-content:center; }
  .flow-row { display:flex; align-items:stretch; gap:0; width:100%; position:relative; }
  .stage-card { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--sp-m) var(--sp-s); display:flex; flex-direction:column; align-items:center; text-align:center; position:relative; transition:border-color 0.3s,box-shadow 0.3s; }
  .stage-card:hover { border-color:var(--accent); box-shadow:0 4px 20px rgba(217,119,75,0.08); }
  .stage-num { font-family:"Source Serif 4",serif; font-size:64px; font-weight:600; color:var(--accent); line-height:1; letter-spacing:-0.02em; margin-bottom:var(--sp-xs); }
  .stage-name { font-family:-apple-system,sans-serif; font-size:var(--fs-body); font-weight:600; color:var(--text-primary); margin-bottom:6px; letter-spacing:0.03em; }
  .stage-desc { font-family:-apple-system,sans-serif; font-size:14px; color:var(--text-muted); line-height:1.5; max-width:200px; }
  .stage-arrow { flex:0 0 60px; display:flex; align-items:center; justify-content:center; position:relative; }
  .stage-arrow::before { content:''; display:block; width:30px; height:1px; background:var(--accent); opacity:0.35; position:relative; }
  .stage-arrow::after { content:''; position:absolute; right:12px; top:50%; margin-top:-4px; border:5px solid transparent; border-left-color:var(--accent); opacity:0.35; }
  .bottom-note { margin-top:var(--sp-l); text-align:center; font-family:"Source Serif 4",serif; font-size:var(--fs-small); color:var(--text-muted); font-style:italic; letter-spacing:0.04em; }
  .phase-keys { display:flex; gap:6px; margin-top:var(--sp-xs); flex-wrap:wrap; justify-content:center; }
  .phase-key { font-family:-apple-system,sans-serif; font-size:11px; color:var(--text-muted); background:var(--bg-warm); padding:2px 8px; border-radius:999px; letter-spacing:0.03em; }
  .slide-number { position:absolute; bottom:44px; right:var(--sp-2xl); font-family:-apple-system,sans-serif; font-size:var(--fs-tiny); color:var(--text-muted); letter-spacing:0.06em; }
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <span class="section-num">13 · FLOW</span>
    <h2 class="section-title">/auto-dev &mdash; 全流程自动化</h2>
    <span class="section-sub">从 Story 到提交，AI 全程驱动</span>
  </div>
  <div class="flow-container">
    <div class="flow-row">
      <div class="stage-card">
        <div class="stage-num">一</div>
        <div class="stage-name">需求分析</div>
        <div class="stage-desc">自动读 TAPD + 设计稿 + 确定改动范围</div>
        <div class="phase-keys"><span class="phase-key">TAPD</span><span class="phase-key">Pencil</span></div>
      </div>
      <div class="stage-arrow"></div>
      <div class="stage-card">
        <div class="stage-num">二</div>
        <div class="stage-name">方案设计</div>
        <div class="stage-desc">输出 Mini-Spec 与用户对齐</div>
        <div class="phase-keys"><span class="phase-key">技术方案</span><span class="phase-key">对齐确认</span></div>
      </div>
      <div class="stage-arrow"></div>
      <div class="stage-card">
        <div class="stage-num">三</div>
        <div class="stage-name">编码实现</div>
        <div class="stage-desc">自动查接口 + 套规范 + 避险</div>
        <div class="phase-keys"><span class="phase-key">Apifox</span><span class="phase-key">mistakes.md</span></div>
      </div>
      <div class="stage-arrow"></div>
      <div class="stage-card">
        <div class="stage-num">四</div>
        <div class="stage-name">代码审查</div>
        <div class="stage-desc">10 维度自检</div>
        <div class="phase-keys"><span class="phase-key">review.md</span></div>
      </div>
      <div class="stage-arrow"></div>
      <div class="stage-card">
        <div class="stage-num">五</div>
        <div class="stage-name">交付收尾</div>
        <div class="stage-desc">commit + CHANGELOG + TAPD 闭环</div>
        <div class="phase-keys"><span class="phase-key">Git</span><span class="phase-key">TAPD</span></div>
      </div>
    </div>
  </div>
  <div class="bottom-note">一个 Story 从需求到提交，全程 AI 驱动</div>
  <div class="slide-number">13</div>
</div>
<script>
if (window.self === window.top) {
  (function() {
    var W = 1920, H = 1080;
    function fit() {
      var s = Math.min(window.innerWidth / W, window.innerHeight / H);
      document.body.style.transform = 'scale(' + s + ')';
    }
    fit(); window.addEventListener('resize', fit);
  })();
}
</script>
</body>
</html>
