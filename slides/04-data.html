<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>04 · 核心数据一览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=Source+Serif+4:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .slide {
    width: 1920px; height: 1080px;
    position: relative;
    padding: var(--sp-l) var(--sp-2xl) 44px;
    display: flex;
    flex-direction: column;
  }

  /* 顶部标题栏 */
  .header {
    display: flex;
    align-items: baseline;
    gap: var(--sp-s);
    margin-bottom: var(--sp-m);
  }
  .section-num {
    font-family: -apple-system, sans-serif;
    font-size: var(--fs-tiny);
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .section-title {
    font-family: "Source Serif 4", "Newsreader", serif;
    font-size: var(--fs-title);
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin: 0;
  }
  .section-sub {
    margin-left: auto;
    font-family: -apple-system, sans-serif;
    font-size: var(--fs-small);
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* 数据卡片网格 */
  .data-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: 1fr 1fr;
    gap: var(--sp-s);
    flex: 1;
    margin-bottom: var(--sp-s);
  }

  .data-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--sp-m);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: border-color 0.3s;
  }

  .data-number {
    font-family: "Source Serif 4", "Newsreader", serif;
    font-size: 96px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .data-unit {
    font-family: "Source Serif 4", serif;
    font-size: 28px;
    color: var(--accent);
    font-weight: 400;
    opacity: 0.6;
    margin-left: 2px;
  }

  .data-label {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: var(--fs-body);
    color: var(--text-primary);
    margin-top: var(--sp-xs);
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .data-desc {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: var(--fs-small);
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  /* 底部总结条 */
  .summary-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--sp-l);
    padding: var(--sp-s) var(--sp-l);
    background: var(--bg-warm);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
  }
  .summary-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: -apple-system, sans-serif;
    font-size: var(--fs-small);
    color: var(--text-secondary);
  }
  .summary-item .num {
    font-family: "Source Serif 4", serif;
    color: var(--accent);
    font-weight: 600;
    font-size: var(--fs-sub);
  }
  .summary-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  .slide-number {
    position: absolute;
    bottom: 44px;
    right: var(--sp-2xl);
    font-family: -apple-system, sans-serif;
    font-size: var(--fs-tiny);
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="slide">
  <div class="header">
    <span class="section-num">04 · DATA</span>
    <h2 class="section-title">核心数据一览</h2>
    <span class="section-sub">项目基建量化指标</span>
  </div>

  <div class="data-grid">
    <div class="data-card">
      <div class="data-number">9<span class="data-unit">个</span></div>
      <div class="data-label">规则文件</div>
      <div class="data-desc">覆盖 8 大分类维度</div>
    </div>
    <div class="data-card">
      <div class="data-number">35<span class="data-unit">条</span></div>
      <div class="data-label">踩坑记录</div>
      <div class="data-desc">错题本 — 改代码前必读</div>
    </div>
    <div class="data-card">
      <div class="data-number">9<span class="data-unit">条</span></div>
      <div class="data-label">架构决策 ADR</div>
      <div class="data-desc">记录 "为什么这么做"</div>
    </div>
    <div class="data-card">
      <div class="data-number">47<span class="data-unit">条</span></div>
      <div class="data-label">跨文件依赖</div>
      <div class="data-desc">隐蔽血缘关系映射</div>
    </div>
    <div class="data-card">
      <div class="data-number">173<span class="data-unit">张</span></div>
      <div class="data-label">数据库表</div>
      <div class="data-desc">完整 Schema 字段索引</div>
    </div>
    <div class="data-card">
      <div class="data-number">4<span class="data-unit">套</span></div>
      <div class="data-label">MCP 工具链</div>
      <div class="data-desc">TAPD · Apifox · Pencil · Stitch</div>
    </div>
  </div>

  <div class="summary-bar">
    <div class="summary-item">
      <span class="num">~70KB</span> 规则知识沉淀
    </div>
    <span class="summary-divider"></span>
    <div class="summary-item">
      <span class="num">1,024</span> 行规范代码
    </div>
    <span class="summary-divider"></span>
    <div class="summary-item">
      <span class="num">&yen;0</span> 额外成本 · 持续自动增殖
    </div>
  </div>

  <div class="slide-number">04</div>
</div>

<script>
if (window.self === window.top) {
  (function() {
    var W = 1920, H = 1080;
    function fit() {
      var s = Math.min(window.innerWidth / W, window.innerHeight / H);
      document.body.style.transform = 'scale(' + s + ')';
    }
    fit(); window.addEventListener('resize', fit);
  })();
}
</script>

</body>
</html>
