<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>数字赛场 · AI Native 研发基建</title>

<!-- ═══════════════════════════════════════════ -->
<!-- Deck 页面清单 — 按演讲顺序排列              -->
<!-- ═══════════════════════════════════════════ -->
<script>
  window.DECK_MANIFEST = [
    { file: "slides/01-cover.html",         label: "封面" },
    { file: "slides/02-pitch.html",         label: "一句话讲清楚" },
    { file: "slides/03-agenda.html",        label: "目录" },
    { file: "slides/04-data.html",          label: "核心数据一览" },
    { file: "slides/05-problems.html",      label: "三个核心问题" },
    { file: "slides/06-before-after.html",  label: "开发体验对比" },
    { file: "slides/07-cost.html",          label: "性价比" },
    { file: "slides/08-architecture.html",  label: "系统架构全景" },
    { file: "slides/09-rules-grid.html",    label: "规则引擎 9 文件" },
    { file: "slides/10-mistakes.html",      label: "错题本机制" },
    { file: "slides/11-dependency.html",    label: "隐蔽依赖映射" },
    { file: "slides/12-decisions.html",     label: "架构决策 ADR" },
    { file: "slides/14-review.html",        label: "/review 10 维度审查" },
    { file: "slides/15-mcp.html",           label: "MCP 工具链" },
    { file: "slides/16-compare.html",       label: "开发模式对比" },
    { file: "slides/17-startup.html",       label: "5 分钟 Copy" },
    { file: "slides/18-evolution.html",     label: "演进路线" },
    { file: "slides/19-faq.html",           label: "常见疑问" },
    { file: "slides/20-outro.html",         label: "总结致谢" },
  ];

  window.DECK_WIDTH  = 1920;
  window.DECK_HEIGHT = 1080;
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #EBE5DD;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", system-ui, sans-serif;
  }
  #stage {
    position: fixed;
    top: 50%; left: 50%;
    transform-origin: top left;
    will-change: transform;
    background: #FBFAF7;
    box-shadow: 0 8px 60px rgba(0,0,0,0.08);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #FBFAF7;
  }
  .counter {
    position: fixed;
    bottom: 24px;
    right: 28px;
    background: rgba(255,255,255,0.85);
    color: #141413;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    z-index: 100;
    user-select: none;
    opacity: 0.7;
    transition: opacity 0.2s;
    font-family: -apple-system, sans-serif;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    backdrop-filter: blur(4px);
  }
  .counter:hover { opacity: 1; }
  .counter .label { color: rgba(0,0,0,0.4); margin-left: 10px; }
  .nav-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 12%;
    cursor: pointer;
    z-index: 50;
  }
  .nav-zone.left  { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
    color: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .nav-zone.left  .nav-hint { left: 28px; }
  .nav-zone.right .nav-hint { right: 28px; }
  .nav-zone:hover .nav-hint { opacity: 1; }

  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { background: #fff; overflow: visible; height: auto; }
    #stage { position: static; transform: none !important; box-shadow: none; }
    .counter, .nav-zone { display: none !important; }
    .print-stack { display: block; }
    .print-stack iframe {
      width: 1920px; height: 1080px;
      page-break-after: always;
      display: block;
    }
  }
</style>
</head>
<body>

<div id="stage">
  <iframe id="frame" src="about:blank"></iframe>
</div>

<div class="nav-zone left"  id="navL"><div class="nav-hint">&#8249;</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">&#8250;</div></div>
<div class="counter" id="counter">1 / 1</div>

<div class="print-stack" id="printStack" style="display:none;"></div>

<script>
(function () {
  const W = window.DECK_WIDTH || 1920;
  const H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById('stage');
  const frame = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const printStack = document.getElementById('printStack');
  const storageKey = 'infra-deck-' + location.pathname;
  let current = 0;

  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';

  function fit() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    const x = (window.innerWidth  - W * s) / 2;
    const y = (window.innerHeight - H * s) / 2;
    stage.style.top = '0';
    stage.style.left = '0';
    stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
  }

  function show(idx) {
    if (idx < 0 || idx >= deck.length) return;
    current = idx;
    frame.src = deck[idx].file;
    counter.innerHTML = `${idx + 1} / ${deck.length} <span class="label">${deck[idx].label || ''}</span>`;
    try { localStorage.setItem(storageKey, String(idx)); } catch (_) {}
    if (location.hash !== '#' + (idx + 1)) {
      history.replaceState(null, '', '#' + (idx + 1));
    }
  }

  function next() { show(Math.min(current + 1, deck.length - 1)); }
  function prev() { show(Math.max(current - 1, 0)); }

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
      case 'ArrowLeft':  case 'PageUp':              e.preventDefault(); prev(); break;
      case 'Home':                                    e.preventDefault(); show(0); break;
      case 'End':                                     e.preventDefault(); show(deck.length - 1); break;
      case 'p': case 'P':                             window.print(); break;
      default:
        if (e.key >= '1' && e.key <= '9') {
          const i = parseInt(e.key, 10) - 1;
          if (i < deck.length) { e.preventDefault(); show(i); }
        }
    }
  });

  document.getElementById('navL').addEventListener('click', prev);
  document.getElementById('navR').addEventListener('click', next);
  window.addEventListener('resize', fit);

  window.addEventListener('hashchange', () => {
    const m = location.hash.match(/^#(\d+)$/);
    if (m) show(parseInt(m[1], 10) - 1);
  });

  const hashMatch = location.hash.match(/^#(\d+)$/);
  if (hashMatch) current = Math.min(parseInt(hashMatch[1], 10) - 1, deck.length - 1);
  else try {
    const v = parseInt(localStorage.getItem(storageKey), 10);
    if (!isNaN(v) && v >= 0 && v < deck.length) current = v;
  } catch (_) {}

  fit();
  show(current);

  window.addEventListener('beforeprint', () => {
    printStack.innerHTML = '';
    deck.forEach(item => {
      const f = document.createElement('iframe');
      f.src = item.file;
      printStack.appendChild(f);
    });
    printStack.style.display = 'block';
    stage.style.display = 'none';
  });
  window.addEventListener('afterprint', () => {
    printStack.innerHTML = '';
    printStack.style.display = 'none';
    stage.style.display = '';
  });
})();
</script>

</body>
</html>
